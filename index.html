<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam - Developer Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header data-include="sections/nav.html"></header>

    <main>
        <div data-include="sections/hero.html"></div>
        <div class="divider"></div>
        <div data-include="sections/experience.html"></div>
        <div class="divider"></div>
        <div data-include="sections/skills.html"></div>
        <div class="divider"></div>
        <div data-include="sections/projects.html"></div>
        <div class="divider"></div>
        <div data-include="sections/contact.html"></div>
    </main>

    <div data-include="sections/footer.html"></div>

    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <script>
        // Load all HTML partials
        async function loadIncludes() {
            const els = document.querySelectorAll('[data-include]');
            await Promise.all([...els].map(async el => {
                const res = await fetch(el.getAttribute('data-include'));
                el.innerHTML = await res.text();
            }));

            // Init typed.js after hero is loaded
            new Typed('#element', {
                strings: ['Full Stack Web Developer', 'Web Designer', 'Data Analyst', 'Software Tester'],
                typeSpeed: 55,
                backSpeed: 30,
                loop: true,
            });

            // Hamburger menu
            document.getElementById('hamburger').addEventListener('click', () => {
                document.getElementById('nav-menu').classList.toggle('open');
            });
        }

        loadIncludes();
    </script>
</body>
</html>
